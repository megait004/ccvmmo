<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" width="220" height="64">
  <!-- Background: transparent -->

  <!-- ZADE text - bold, large -->
  <text
    x="110"
    y="30"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="30"
    font-weight="900"
    fill="#111111"
    letter-spacing="10"
  >ZADE</text>

  <!-- Thin separator line -->
  <line x1="30" y1="38" x2="190" y2="38" stroke="#111111" stroke-width="0.8" />

  <!-- WEAR text - lighter weight, smaller with wider spacing -->
  <text
    x="110"
    y="57"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="300"
    fill="#111111"
    letter-spacing="12"
  >WEAR</text>
</svg>
